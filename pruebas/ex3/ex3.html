<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <title>Ex3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <h1>Operacions</h1>
  <p>Introdueix dos números i selecciona una operació:</p>
  <input type="number" id="num1" placeholder="Primer número" />
  <input type="number" id="num2" placeholder="Segon número" />
  <label for="operation">Operació:</label>
  <select id="operation">
    <option value="add">Suma</option>
    <option value="subtract">Resta</option>
    <option value="multiply">Multiplicació</option>
    <option value="divide">Divisió</option>
  </select>
  <button id="calculate">Calcular</button>


  <script type="module" src="ex3.js"></script>
</body>
</html>
