<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320" style="background:#0d1117;font-family:'Segoe UI',system-ui,sans-serif">
  <!-- Title -->
  <text x="250" y="38" fill="#d2a8ff" font-size="20" font-weight="700" text-anchor="middle" letter-spacing="0.5">Herencia / Generalización UML</text>

  <!-- Superclass -->
  <rect x="130" y="60" width="240" height="60" rx="10" fill="#161b22" stroke="#d2a8ff" stroke-width="2"/>
  <text x="250" y="82" fill="#d2a8ff" font-size="15" font-weight="700" text-anchor="middle">Animal</text>
  <text x="250" y="103" fill="#8b949e" font-size="11" text-anchor="middle">+ comer() · + dormir()</text>

  <!-- Arrow down -->
  <line x1="250" y1="120" x2="250" y2="148" stroke="#d2a8ff" stroke-width="2"/>
  <!-- Hollow triangle -->
  <polygon points="220,148 280,148 250,125" fill="transparent" stroke="#d2a8ff" stroke-width="2"/>

  <line x1="250" y1="148" x2="250" y2="160" stroke="#d2a8ff" stroke-width="2"/>

  <!-- Branch left -->
  <line x1="250" y1="160" x2="120" y2="160" stroke="#d2a8ff" stroke-width="2"/>
  <line x1="120" y1="160" x2="120" y2="170" stroke="#d2a8ff" stroke-width="2"/>
  <polygon points="105,170 135,170 120,152" fill="transparent" stroke="#d2a8ff" stroke-width="2"/>

  <!-- Branch right -->
  <line x1="250" y1="160" x2="380" y2="160" stroke="#d2a8ff" stroke-width="2"/>
  <line x1="380" y1="160" x2="380" y2="170" stroke="#d2a8ff" stroke-width="2"/>
  <polygon points="365,170 395,170 380,152" fill="transparent" stroke="#d2a8ff" stroke-width="2"/>

  <!-- Subclass Perro -->
  <rect x="22" y="180" width="196" height="50" rx="8" fill="#161b22" stroke="#4a1a52" stroke-width="2"/>
  <text x="120" y="203" fill="#d2a8ff" font-size="14" font-weight="700" text-anchor="middle">Perro</text>
  <text x="120" y="220" fill="#8b949e" font-size="11" text-anchor="middle">+ ladrar() · + correr()</text>

  <!-- Subclass Gato -->
  <rect x="282" y="180" width="196" height="50" rx="8" fill="#161b22" stroke="#4a1a52" stroke-width="2"/>
  <text x="380" y="203" fill="#d2a8ff" font-size="14" font-weight="700" text-anchor="middle">Gato</text>
  <text x="380" y="220" fill="#8b949e" font-size="11" text-anchor="middle">+ maullar() · + ronronear()</text>

  <!-- Note -->
  <text x="250" y="270" fill="#8b949e" font-size="12" text-anchor="middle">▷ Flecha vacía apunta a la superclase</text>
  <text x="250" y="290" fill="#8b949e" font-size="12" text-anchor="middle">Las subclases heredan atributos y métodos</text>
  <text x="250" y="310" fill="#8b949e" font-size="12" text-anchor="middle">Relación "es-un": Perro es-un Animal</text>
</svg>